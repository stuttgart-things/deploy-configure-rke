---
- name: Download cilium binary
  block:
    - ansible.builtin.set_fact: bin="{{ cilium_binary|combine(cilium_binary) }}"
    - ansible.builtin.include_role:
        name: download-install-binary

# Air-gapped/edge: import the pre-staged Cilium images tar into containerd before
# the install/upgrade so the agent (DaemonSet, hence every node), operator and
# envoy pods start from the local store. Runs on all hosts, not just the master.
# Pair with cilium_image_pull_policy: Never in cilium-config.yaml.j2 to forbid any
# pull attempt.
- name: Pre-load Cilium images from tar
  ansible.builtin.command: >
    {{ cilium_ctr_cmd }} -a {{ rke2_containerd_sock }} -n k8s.io
    images import {{ cilium_airgapped_archive_path }}
  become: true
  register: cilium_image_import
  changed_when: "'unpacking' in cilium_image_import.stdout"
  when: cilium_airgapped_images | bool

# Run cilium ops only against a stable apiserver. k3s has just started here, so
# the API can still be flapping; installing/upgrading cilium against it can be
# interrupted mid-operation and leave the Helm release stuck in pending-upgrade.
- name: Wait for k8s apiserver to be ready before cilium
  ansible.builtin.command: kubectl get --raw=/readyz
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: cilium_api_readyz
  until: cilium_api_readyz.rc == 0
  retries: "{{ cilium_api_ready_retries | default(30) }}"
  delay: "{{ cilium_api_ready_delay | default(10) }}"
  changed_when: false
  when: inventory_hostname in groups['initial_master_node']

- name: Install Gateway API CRDs
  ansible.builtin.command: >
    kubectl apply -f
    https://github.com/kubernetes-sigs/gateway-api/releases/download/{{ cilium_gateway_api_crds_version }}/standard-install.yaml
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: gateway_api_crds_result
  changed_when: "'configured' in gateway_api_crds_result.stdout or 'created' in gateway_api_crds_result.stdout"
  when:
    - cilium_enable_gateway_api | bool
    - inventory_hostname in groups['initial_master_node']

- name: Create cilium config
  ansible.builtin.template:
    src: cilium-config.yaml.j2
    dest: "{{ config_dir }}/{{ cilium_config }}"
  tags: cilium_config

- name: Check if cilium is already installed
  ansible.builtin.command: cilium status
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: cilium_status
  failed_when: false
  changed_when: false
  when: inventory_hostname in groups['initial_master_node']

- name: Install cilium
  ansible.builtin.shell: |
    set -e
    cilium install \
      --set k8sServiceHost={{ cilium_api_server_ip }} \
      --set k8sServicePort={{ cilium_api_server_port }} \
      --set kubeProxyReplacement={{ cilium_kube_proxy_replacement }} \
      --set ipam.operator.clusterPoolIPv4PodCIDRList='{{ "{" }}{{ cilium_cluster_pool_ipv4_cidr }}{{ "}" }}' \
      --set ipam.operator.clusterPoolIPv4MaskSize={{ cilium_cluster_pool_ipv4_mask_size }} \
      --helm-set=operator.replicas={{ cilium_operator_replicas }}
    cilium status --wait
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  when:
    - inventory_hostname in groups['initial_master_node']
    - cilium_status.rc != 0

- name: Upgrade cilium configuration
  ansible.builtin.shell: |
    set -e
    cilium upgrade -f {{ config_dir }}/{{ cilium_config }}
    cilium status --wait
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: cilium_upgrade
  # `cilium install` replaces kube-proxy and reconfigures the datapath, which can
  # briefly drop the apiserver connection (connection refused / unexpected EOF).
  # Retry so the upgrade rides through that transition instead of failing the run.
  until: cilium_upgrade.rc == 0
  retries: "{{ cilium_upgrade_retries | default(10) }}"
  delay: "{{ cilium_upgrade_delay | default(15) }}"
  changed_when: cilium_upgrade.rc == 0
  when: inventory_hostname in groups['initial_master_node']
